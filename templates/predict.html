<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Tags -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <!-- Page Title -->
    <title>Suicide Prediction Form</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="icon" href="static/images/fevicon.png" type="image/gif">

    <!-- Custom Styles -->
    <style>
        /* Global Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #89f7fe, #66a6ff);
            color: #333;
            margin: 0;
            padding: 0;
        }

        .header {
            background: linear-gradient(120deg, #667eea, #764ba2);
            color: #fff;
            padding: 20px 0;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .container {
            padding: 30px;
        }

        .form-container {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin: 50px auto;
            max-width: 600px;
            transition: all 0.3s ease;
            position: relative;
        }

        .form-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .form-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
            color: #4a4a4a;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-label {
            font-weight: 500;
            color: #555;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .form-control,
        .form-select {
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 16px;
            margin-top: 5px;
            border: 1px solid #ddd;
            transition: border-color 0.3s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #5b9bd5;
            box-shadow: 0 0 8px rgba(91, 155, 213, 0.5);
        }

        .form-check-input {
            margin-right: 10px;
        }

        .form-check-label {
            font-size: 15px;
            color: #444;
        }

        .btn-custom {
            background: linear-gradient(120deg, #764ba2, #667eea);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
            text-align: center;
        }

        .btn-custom:hover {
            background: linear-gradient(120deg, #764ba2, #5b5eea);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Footer Styles */
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>
    <!-- Header Section -->
    <header>
        <div class="header">
            Suicide Prediction Form
        </div>
    </header>

    <!-- Form Section -->
    <section>
        <div class="container">
            <div class="form-container">
                <div class="form-title">Fill in Your Details</div>
                <form action="predict" method="post">

                    <!-- Age Input -->
                    <div class="form-section">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" id="age" name="age" class="form-control" placeholder="Enter your age" required>
                    </div>

                    <!-- Friends Count Input -->
                    <div class="form-section">
                        <label for="friends" class="form-label">Friends Count</label>
                        <input type="number" id="friends" name="friends" class="form-control"
                            placeholder="Enter your number of friends" required>
                    </div>

                    <!-- Depression Radio Buttons -->
                    <div class="form-section">
                        <label class="form-label">Depression</label>
                        <div class="form-check">
                            <input type="radio" id="depression-yes" name="depression" value="Yes"
                                class="form-check-input" required>
                            <label for="depression-yes" class="form-check-label">Yes</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" id="depression-no" name="depression" value="No" class="form-check-input"
                                required>
                            <label for="depression-no" class="form-check-label">No</label>
                        </div>
                    </div>

                    <!-- Social Fear Radio Buttons -->
                    <div class="form-section">
                        <label class="form-label">Social Fear</label>
                        <div class="form-check">
                            <input type="radio" id="socialfear-yes" name="social_fear" value="Yes"
                                class="form-check-input" required>
                            <label for="socialfear-yes" class="form-check-label">Yes</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" id="socialfear-no" name="social_fear" value="No"
                                class="form-check-input" required>
                            <label for="socialfear-no" class="form-check-label">No</label>
                        </div>
                    </div>

                    <!-- Virgin Radio Buttons -->
                    <div class="form-section">
                        <label class="form-label">Virgin</label>
                        <div class="form-check">
                            <input type="radio" id="virgin-yes" name="virgin" value="Yes" class="form-check-input"
                                required>
                            <label for="virgin-yes" class="form-check-label">Yes</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" id="virgin-no" name="virgin" value="No" class="form-check-input"
                                required>
                            <label for="virgin-no" class="form-check-label">No</label>
                        </div>
                    </div>

                    <!-- Gender Dropdown -->
                    <div class="form-section">
                        <label for="gender" class="form-label">Gender</label>
                        <select id="gender" name="gender" class="form-select" required>
                            <option value="" selected disabled>Select Gender</option>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                            <option value="Transgender Male">Transgender Male</option>
                            <option value="Transgender Female">Transgender Female</option>
                        </select>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-custom">Submit</button>

                </form>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer class="footer">
        &copy; 2025 Suicide Prediction Form. All Rights Reserved.
    </footer>

    <!-- JavaScript Files -->
    <script src="static/js/jquery.min.js"></script>
    <script src="static/js/bootstrap.bundle.min.js"></script>
</body>

</html>
