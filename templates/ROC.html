<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298, #f5576c, #ffcc70);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: #333;
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particle Effect */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        /* Container */
        .content {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
            max-width: 600px;
            width: 90%;
        }

        .content:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        /* Heading */
        h1 {
            font-size: 36px;
            font-weight: bold;
            color: #2a5298;
            margin: 0 0 30px 0;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Button/Link Styling */
        .btn-exit {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(120deg, #ff6a88, #ff8e53);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 106, 136, 0.4);
            transition: all 0.4s ease;
        }

        .btn-exit:hover {
            background: linear-gradient(120deg, #ff8e53, #ff6a88);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 106, 136, 0.6);
        }
    </style>
</head>
<body>
    <!-- Particle Background -->
    <div id="particles"></div>

    <!-- Content -->
    <div class="content">
        <h1><b>{{ msg }}</b></h1>
        <a href="{{url_for('predict')}}" class="btn-exit">Click To Complete</a>
    </div>

    <!-- Particle Effect Script -->
    <script>
        // Particle Effect
        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = `${Math.random() * 5}px`;
            particle.style.height = particle.style.width;
            particle.style.background = 'rgba(255, 255, 255, 0.7)';
            particle.style.borderRadius = '50%';
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.animation = `float ${Math.random() * 5 + 3}s infinite ease-in-out`;
            particleContainer.appendChild(particle);
        }

        const styleSheet = document.createElement('style');
        styleSheet.textContent = `@keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-25px); }
            }`;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
