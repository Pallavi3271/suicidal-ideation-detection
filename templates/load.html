<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Dataset - Suicide Attempts</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="icon" href="static/images/fevicon.png" type="image/gif">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .banner-main {
            position: relative;
            text-align: center;
            background: url('static/images/banner-bg.jpg') no-repeat center center/cover;
            min-height: 100vh;
        }

        .form-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            color: white;
        }

        .form-container h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-container input[type="file"],
        .form-container input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        .form-container input[type="submit"] {
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }

        .form-container input[type="submit"]:hover {
            background-color: #218838;
        }
        .form-container h3 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 24px; /* Increase font size */
        color: #ffc107; /* Change text color to yellow */
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); /* Add a text shadow */
        background-color: #333; /* Add background color */
        padding: 10px; /* Add some padding */
        border-radius: 5px; /* Round the edges */
    }
    </style>
</head>
<body>
    <div class="banner-main">
        <div class="form-container">
            <h3>Upload Your Dataset</h3>
            <form action="{{ url_for('loaddataset') }}" method="POST" enctype="multipart/form-data">
                <input type="file" name="uploadfile" accept=".csv" required>
                <input type="submit" value="Submit">
            </form>
        </div>
    </div>

    <script src="static/js/jquery.min.js"></script>
    <script src="static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
